<!DOCTYPE html>
<html>
    <head>
        <title>Autumn's Lab</title>
        <link rel="shortcut icon" href="/favicon.ico" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            @font-face{font-family: bloggermedium; src: url('fonts/Blogger-Sans-Medium.ttf')}
            input{
                font-family: bloggermedium;
                font-size: 14;
                resize:horizontal;
                border: 2px solid black;
                border-radius: 5px;
                padding: 12px 12px;
            }
            #chat{
                display: block;
                position: relative;
                display:inline-block;
                overflow: auto;
                width:85%;
                height: 39vh;
                margin-left: auto;
                margin-right: auto;
                text-align: left;
                margin-top: 35px;
                flex: 0 1 auto;
            }
            #inp{
                position: fixed;
                width: 95%;
                bottom: 5px;
                text-align: center;
            }
            @font-face{font-family: bloggermedium; src: url('fonts/Blogger-Sans-Medium.ttf')}
            .button {
            font-family: bloggermedium;
            border: 2px solid black;
            border-radius: 5px;
            color: black;
            padding: 11px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            background-color:#FFEBBE;
            transition-duration: 0.4s;
        }
        </style>
    </head>
    <body>
        <style>
            @font-face{font-family: bloggerlight; src: url('fonts/Blogger-Sans-Light.ttf')}
            body{
                background-image: url('bg.jpg');
                background-size: cover;
                text-align:center;
                font-family: bloggerlight;
                font-size: 14;
            }
        </style>
        <a href="index.html" style="text-decoration:none"><font size=5 color="#FFEBBE"><h1>AUTUMN'S LAB</h1></font></a>
        <h3 style="font-size: 11px; text-align: center;">We use cookies to keep your username, even if you leave the website! We don't collect any other type of data though.
            So, by using this website, you consent the use of these little cookies that hurt no one :3.<br>
        </h3>
        <style>
            @font-face { font-family: rubikmedium; src: url('fonts/Rubik-ExtraBold.ttf'); } 
            h1 {
                font-family: rubikmedium;
                -webkit-text-stroke: 1px black;
            }
            @font-face{font-family: bloggerlight; src: url('fonts/Blogger-Sans-Light.ttf')}
            h2{
                font-family: bloggerlight;
            }
        </style>
        <div id="chat">
            <center>
            <h3>This is where your chat with MOONSTAR's 8ball begins.</h3></center>
        </div>
        <div id="inp">
            <input id="message" type="text" style="width:50%" placeholder="Say something." autofocus onkeypress="clickPress(event)"/> 
            <button class="button send" onclick="doFunction();"><img src="R.png" height = 15px width = 15px></button>
            <button class="button change" onclick="changeUser();" style="text-align:center;"><img src="S.png" height = 15px width = 15px></button>
        </div>
    </body>
    <script src="ball.js"></script>
</html>
